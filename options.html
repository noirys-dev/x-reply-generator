<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>options — aesthetic x reply generator</title>
  <style>
    /* ——— reset ——— */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ——— base ——— */
    body {
      background-color: #000000;
      color: #999999;
      font-family: "Inter", "Helvetica Neue", sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ——— container ——— */
    .options-card {
      width: 380px;
      background-color: #111111;
      border: 1px solid #333333;
      border-radius: 2px;
      padding: 32px;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    /* ——— header ——— */
    .options-header {
      margin-bottom: 28px;
    }

    .options-title {
      font-size: 13px;
      font-weight: 500;
      color: #cccccc;
      letter-spacing: 0.18em;
      margin-bottom: 6px;
    }

    .options-subtitle {
      font-size: 11px;
      color: #555555;
      letter-spacing: 0.1em;
    }

    /* ——— divider ——— */
    .divider {
      width: 100%;
      height: 1px;
      background-color: #222222;
      margin-bottom: 24px;
    }

    /* ——— form ——— */
    .field-label {
      display: block;
      font-size: 10px;
      color: #666666;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      background-color: #0a0a0a;
      border: 1px solid #333333;
      border-radius: 2px;
      padding: 10px 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #cccccc;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .field-input::placeholder {
      color: #333333;
    }

    .field-input:focus {
      border-color: #555555;
    }

    /* ——— button ——— */
    .save-btn {
      width: 100%;
      margin-top: 20px;
      padding: 10px 0;
      background-color: #222222;
      border: 1px solid #333333;
      border-radius: 2px;
      color: #999999;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .save-btn:hover {
      background-color: #2a2a2a;
      color: #cccccc;
    }

    .save-btn:active {
      background-color: #1a1a1a;
    }

    /* ——— status message ——— */
    .status-msg {
      margin-top: 14px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-align: center;
      min-height: 14px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .status-msg.visible {
      opacity: 1;
    }

    .status-msg.success {
      color: #4a7a5a;
    }

    .status-msg.error {
      color: #7a4a4a;
    }

    /* ——— animation ——— */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="options-card">
    <div class="options-header">
      <div class="options-title">settings</div>
      <div class="options-subtitle">aesthetic x reply generator</div>
    </div>

    <div class="divider"></div>

    <label class="field-label" for="api-key-input">groq api key</label>
    <input type="password" id="api-key-input" class="field-input" placeholder="enter your api key" spellcheck="false"
      autocomplete="off" />

    <button id="save-btn" class="save-btn">save key</button>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <script src="options.js"></script>

</body>

</html>
